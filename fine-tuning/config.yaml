# Fine-tuning configuration for Nemotron-Nano-4B
# Build Small Hackathon 2026

model:
  base_model: "nvidia/Llama-3.1-Nemotron-Nano-4B-v1.1"
  model_type: "causal_lm"
  max_seq_length: 2048

lora:
  rank: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  task_type: "CAUSAL_LM"
  bias: "none"

training:
  output_dir: "./fine-tuning/output"
  num_train_epochs: 3
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.1
  lr_scheduler_type: "cosine"
  bf16: true
  logging_steps: 10
  save_strategy: "epoch"
  eval_strategy: "epoch"  # Fixed: was evaluation_strategy (deprecated)
  per_device_eval_batch_size: 4
  gradient_checkpointing: true
  optim: "adamw_8bit"
  seed: 42

dataset:
  train_file: "./fine-tuning/dataset/train.jsonl"
  val_file: "./fine-tuning/dataset/val.jsonl"
  format: "conversational"  # messages format for chat models

quantization:
  load_in_4bit: true
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_compute_dtype: "bfloat16"
  bnb_4bit_use_double_quant: true